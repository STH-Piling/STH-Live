<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STH Piling — Live Jobs</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2E3038">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="STH Live">
<link rel="icon" type="image/png" href="favicon.png">
<link rel="apple-touch-icon" href="icon-192.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;700;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

<!-- Firebase init for live data overrides (Option A + B integration) -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
  import {
    getFirestore, collection, doc, getDoc, getDocs, query, where, onSnapshot,
    setDoc, serverTimestamp
  } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDmUGL8Tyfy74OMjgaBZlFK-PTFG3AYYK0",
    authDomain: "sth-cartage.firebaseapp.com",
    projectId: "sth-cartage",
    storageBucket: "sth-cartage.firebasestorage.app",
    messagingSenderId: "613314698438",
    appId: "1:613314698438:web:6acb8a91215b5a8efe0bc7"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  window.sthLive = { db, collection, doc, getDoc, getDocs, query, where, onSnapshot, setDoc, serverTimestamp, ready: true };
  window.dispatchEvent(new CustomEvent('firebase-ready'));
</script>
<style>
  :root {
    --charcoal: #2E3038;
    --charcoal-2: #3a3d47;
    --charcoal-3: #494d59;
    --yellow: #F5C800;
    --yellow-dim: #c9a300;
    --bg: #1a1c22;
    --panel: #23262e;
    --panel-2: #2a2d36;
    --line: #3a3d47;
    --text: #e8e9ec;
    --text-dim: #9ea2ad;
    --text-faint: #6b6f7a;
    --good: #4ade80;
    --warn: #fbbf24;
    --bad: #f87171;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Archivo', sans-serif;
    height: 100%;
    overflow: hidden;
  }
  body {
    display: flex;
    flex-direction: column;
    background:
      radial-gradient(circle at 20% 0%, rgba(245,200,0,0.04) 0%, transparent 40%),
      radial-gradient(circle at 80% 100%, rgba(245,200,0,0.03) 0%, transparent 40%),
      var(--bg);
  }

  header {
    background: var(--charcoal);
    border-bottom: 3px solid var(--yellow);
    padding: 14px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .brand { display: flex; align-items: center; gap: 16px; }
  .logo-mark {
    width: 44px; height: 44px;
    background: var(--yellow); color: var(--charcoal);
    display: flex; align-items: center; justify-content: center;
    font-weight: 900; font-size: 18px; letter-spacing: -0.5px;
    transform: skewX(-8deg);
  }
  .logo-mark span { transform: skewX(8deg); }
  .brand-text { display: flex; flex-direction: column; }
  .brand-text .title { font-weight: 900; font-size: 22px; letter-spacing: 1px; line-height: 1; }
  .brand-text .sub {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; color: var(--yellow);
    letter-spacing: 3px; margin-top: 4px; text-transform: uppercase;
  }
  .header-meta { display: flex; gap: 32px; align-items: center; }
  .meta-block { text-align: right; }
  .meta-block .label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; color: var(--text-faint);
    letter-spacing: 2px; text-transform: uppercase;
  }
  .meta-block .value {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700; font-size: 18px;
    color: var(--yellow); margin-top: 2px;
  }
  .install-btn {
    display: none;
    align-items: center;
    gap: 8px;
    background: var(--yellow);
    color: var(--charcoal);
    border: none;
    padding: 6px 14px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.2s;
  }
  .install-btn:hover { background: var(--yellow-dim); }
  .install-btn.show { display: flex; }

  .live-pill {
    display: flex; align-items: center; gap: 8px;
    background: rgba(74, 222, 128, 0.12);
    border: 1px solid rgba(74, 222, 128, 0.3);
    padding: 6px 14px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; font-weight: 700;
    letter-spacing: 2px; color: var(--good);
  }
  .live-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--good);
    box-shadow: 0 0 12px var(--good);
    animation: pulse 1.6s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  .summary-strip {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    background: var(--charcoal);
    border-bottom: 1px solid var(--line);
    flex-shrink: 0;
  }
  .summary-tile {
    padding: 18px 20px 16px;
    border-right: 1px solid var(--charcoal-3);
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    gap: 4px;
  }
  .summary-tile:last-child { border-right: none; }
  .summary-tile::before {
    content: '';
    position: absolute; left: 0; top: 0;
    width: 3px; height: 100%;
    background: var(--yellow);
    opacity: 0;
    transition: opacity 0.2s;
  }
  .summary-tile:hover::before { opacity: 1; }
  .summary-tile .label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing: 2px;
    color: var(--text-faint); text-transform: uppercase;
  }
  .summary-tile .value {
    font-weight: 900; font-size: 40px; line-height: 1;
    letter-spacing: -1.5px;
    color: var(--yellow);
    margin-top: 4px;
  }
  .summary-tile .value .unit {
    font-size: 14px; color: var(--text-dim);
    font-weight: 500; margin-left: 5px;
  }
  .summary-tile .boq {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; color: var(--text-dim);
    margin-top: 6px; letter-spacing: 1px;
  }

  /* HALF-CIRCLE GAUGE */
  .gauge {
    position: relative;
    display: inline-block;
  }
  .gauge svg {
    display: block;
    overflow: visible;
  }
  .gauge .track {
    fill: none;
    stroke: var(--charcoal-3);
    stroke-linecap: butt;
  }
  .gauge .fill {
    fill: none;
    stroke: var(--good);
    stroke-linecap: butt;
    transition: stroke-dasharray 0.8s cubic-bezier(0.4, 0, 0.2, 1), stroke 0.3s;
  }
  .gauge .fill.warn { stroke: var(--warn); }
  .gauge .fill.good { stroke: var(--good); }
  .gauge .fill.bad  { stroke: var(--bad); }
  .gauge .pct-text {
    position: absolute;
    left: 50%;
    bottom: 4px;
    transform: translateX(-50%);
    font-family: 'JetBrains Mono', monospace;
    font-weight: 900;
    color: var(--text);
    line-height: 1;
    text-align: center;
  }
  .gauge.lg { width: 88px; height: 50px; }
  .gauge.lg .pct-text { font-size: 20px; }
  .gauge.sm { width: 78px; height: 44px; }
  .gauge.sm .pct-text { font-size: 14px; }

  main {
    flex: 1;
    overflow: hidden;
    padding: 20px 28px 28px;
    display: flex;
    flex-direction: column;
  }
  .jobs-viewport {
    flex: 1;
    overflow: hidden;
    position: relative;
    mask-image: linear-gradient(to bottom, transparent 0, black 24px, black calc(100% - 24px), transparent 100%);
    -webkit-mask-image: linear-gradient(to bottom, transparent 0, black 24px, black calc(100% - 24px), transparent 100%);
  }
  .jobs-scroller {
    display: flex;
    flex-direction: column;
    gap: 16px;
    will-change: transform;
  }
  .section-title {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
  }
  .section-title .bar { width: 4px; height: 22px; background: var(--yellow); }
  .section-title h2 {
    font-weight: 900; font-size: 16px;
    letter-spacing: 2px; text-transform: uppercase;
  }
  .section-title .count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; color: var(--text-faint);
    letter-spacing: 2px; margin-left: auto;
  }

  .jobs-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(560px, 1fr));
    gap: 16px;
  }
  /* The clone grid needs the same gap below the original to keep loop seamless */
  .jobs-grid-clone-spacer {
    height: 16px;
  }
  .job-card {
    background: var(--panel);
    border: 1px solid var(--line);
    position: relative;
    overflow: hidden;
    transition: border-color 0.2s, transform 0.2s;
  }
  .job-card:hover {
    border-color: var(--yellow);
    transform: translateY(-2px);
  }
  .job-card.idle { opacity: 0.65; }
  .job-card.idle:hover { opacity: 1; }

  .job-header {
    padding: 14px 18px;
    background: var(--charcoal);
    border-bottom: 2px solid var(--yellow);
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
  }
  .job-header .left .job-id {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; color: var(--yellow);
    letter-spacing: 2px; font-weight: 700;
  }
  .job-header .left .job-name {
    font-weight: 900; font-size: 17px;
    line-height: 1.2; margin-top: 4px;
    letter-spacing: -0.3px;
  }
  .job-header .left .job-client {
    font-size: 12px; color: var(--text-dim);
    margin-top: 4px;
  }
  .status-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; font-weight: 700;
    letter-spacing: 2px; padding: 4px 10px;
    text-transform: uppercase; flex-shrink: 0;
    cursor: pointer;
    user-select: none;
    transition: filter 0.15s, transform 0.15s;
  }
  .status-badge:hover { filter: brightness(1.15); }
  .status-badge:active { transform: scale(0.97); }
  .status-badge.confirming {
    background: var(--bad) !important;
    color: white !important;
    border: 1px solid var(--bad) !important;
    animation: confirmPulse 0.6s ease-in-out infinite;
  }
  @keyframes confirmPulse {
    0%, 100% { opacity: 1; }
    50%      { opacity: 0.6; }
  }
  .status-active { background: var(--yellow); color: var(--charcoal); }
  .status-idle   { background: var(--charcoal-3); color: var(--text-dim); }
  .status-complete {
    background: rgba(74, 222, 128, 0.2);
    color: var(--good);
    border: 1px solid rgba(74, 222, 128, 0.3);
  }

  .job-body {
    padding: 20px 14px 16px;
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 6px;
  }
  .material-cell {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    padding: 6px 2px;
    border-right: 1px dashed var(--line);
  }
  .material-cell:last-child { border-right: none; }
  .material-cell .name {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    color: var(--text-dim);
    letter-spacing: 1.2px;
    text-transform: uppercase;
    text-align: center;
  }
  .material-cell .gauge.sm { width: 70px; height: 40px; }
  .material-cell .gauge.sm .pct-text { font-size: 13px; }
  .material-cell .nums {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    text-align: center;
    line-height: 1.4;
  }
  .material-cell .nums .actual {
    color: var(--yellow);
    font-weight: 700;
  }
  .material-cell .nums .unit-txt {
    color: var(--text-faint);
  }
  .material-cell .nums .boq-line {
    color: var(--text-faint);
    font-size: 10px;
  }

  /* LIVE indicator — pulsing yellow dot for cells driven by real-time Firebase data */
  .live-dot {
    display: inline-block;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--yellow);
    margin-left: 5px;
    vertical-align: middle;
    animation: livePulse 1.6s ease-in-out infinite;
    box-shadow: 0 0 6px rgba(245,200,0,0.6);
  }
  @keyframes livePulse {
    0%, 100% { opacity: 0.4; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.25); }
  }

  .job-footer {
    padding: 10px 18px;
    background: var(--panel-2);
    border-top: 1px solid var(--line);
    display: flex;
    justify-content: space-between;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
  }
  .job-footer .label { color: var(--text-faint); letter-spacing: 1px; text-transform: uppercase; font-size: 10px; }
  .job-footer .val { color: var(--text); margin-left: 6px; }

  main::-webkit-scrollbar { width: 8px; }
  main::-webkit-scrollbar-track { background: var(--bg); }
  main::-webkit-scrollbar-thumb { background: var(--charcoal-3); }
  main::-webkit-scrollbar-thumb:hover { background: var(--yellow-dim); }

  .ticker {
    background: var(--charcoal);
    border-top: 1px solid var(--line);
    padding: 8px 0;
    overflow: hidden;
    flex-shrink: 0;
    position: relative;
  }
  .ticker-inner {
    display: flex;
    gap: 48px;
    white-space: nowrap;
    animation: scroll 60s linear infinite;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    letter-spacing: 1px;
  }
  .ticker-item { display: flex; align-items: center; gap: 8px; }
  .ticker-item .arrow { color: var(--yellow); font-weight: 700; }
  .ticker-item .label { color: var(--text-faint); }
  .ticker-item .value { color: var(--text); font-weight: 700; }
  @keyframes scroll {
    from { transform: translateX(0); }
    to { transform: translateX(-50%); }
  }

  .job-docs {
    padding: 8px 18px;
    background: rgba(245, 200, 0, 0.04);
    border-top: 1px solid var(--line);
    display: flex;
    gap: 18px;
    flex-wrap: wrap;
    font-family: 'JetBrains Mono', monospace;
  }
  .doc-pill {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .doc-pill .count {
    color: var(--yellow);
    font-weight: 700;
    font-size: 13px;
  }
  .doc-pill .label {
    color: var(--text-faint);
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }
  .doc-pill.empty .label {
    color: var(--text-faint);
    font-style: italic;
  }

  /* ============ TABS ============ */
  .tabs {
    display: flex;
    background: var(--charcoal);
    border-bottom: 1px solid var(--line);
    flex-shrink: 0;
    padding: 0 28px;
    gap: 4px;
  }
  .tab {
    padding: 14px 28px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-faint);
    cursor: pointer;
    border-bottom: 3px solid transparent;
    transition: color 0.2s, border-color 0.2s, background 0.2s;
    user-select: none;
  }
  .tab:hover {
    color: var(--text);
    background: rgba(245, 200, 0, 0.04);
  }
  .tab.active {
    color: var(--yellow);
    border-bottom-color: var(--yellow);
  }
  .view { display: none; flex-direction: column; flex: 1; min-height: 0; }
  .view.active { display: flex; }

  /* ============ COMPLETED VIEW ============ */
  .completed-viewport {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    padding-right: 4px;
  }
  .completed-viewport::-webkit-scrollbar { width: 8px; }
  .completed-viewport::-webkit-scrollbar-track { background: var(--bg); }
  .completed-viewport::-webkit-scrollbar-thumb { background: var(--charcoal-3); }
  .completed-viewport::-webkit-scrollbar-thumb:hover { background: var(--yellow-dim); }

  /* Completed cards keep full clarity but get a subtle green outline so it's obvious */
  #completed-grid .job-card {
    border-color: rgba(74, 222, 128, 0.3);
  }
  #completed-grid .job-card .job-header {
    border-bottom-color: var(--good);
  }

  /* ============ CLAIMS GRID ============ */
  .claims-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(440px, 1fr));
    gap: 16px;
    padding-bottom: 24px;
  }
  .claims-totals-strip {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 1px;
    background: var(--charcoal);
    border: 1px solid var(--line);
    margin-bottom: 18px;
  }
  .claims-totals-tile {
    background: var(--panel);
    padding: 14px 18px;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
  }
  .claims-totals-tile .label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing: 2px;
    color: var(--text-faint); text-transform: uppercase;
  }
  .claims-totals-tile .value {
    font-weight: 900; font-size: 24px; line-height: 1.1;
    color: var(--yellow); margin-top: 6px;
  }
  .claims-card {
    background: var(--panel);
    border: 1px solid var(--line);
    cursor: pointer;
    transition: border-color 0.2s, transform 0.2s;
  }
  .claims-card:hover {
    border-color: var(--yellow);
    transform: translateY(-2px);
  }
  .claims-card .job-header {
    padding: 14px 18px;
    background: var(--charcoal);
    border-bottom: 2px solid var(--yellow);
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
  }
  .claims-card .job-header .job-id {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; color: var(--yellow);
    letter-spacing: 2px; font-weight: 700;
  }
  .claims-card .job-header .job-name {
    font-weight: 900; font-size: 17px;
    line-height: 1.2; margin-top: 4px;
  }
  .claims-card .job-header .job-client {
    font-size: 12px; color: var(--text-dim);
    margin-top: 4px;
  }
  .claims-body {
    padding: 18px 18px 4px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }
  .claims-cell {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .claims-cell .label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing: 2px;
    color: var(--text-faint); text-transform: uppercase;
  }
  .claims-cell .value {
    font-weight: 900; font-size: 22px;
    color: var(--yellow); letter-spacing: -0.5px;
    line-height: 1;
  }
  .claims-cell .value.muted { color: var(--text); }
  .claims-cell.variations-cell .value {
    color: var(--yellow);
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .claims-cell.variations-cell .value:hover {
    text-decoration: underline;
  }
  .claims-cell.variations-cell .chev {
    font-size: 14px;
    color: var(--text-dim);
  }
  .claims-progress {
    padding: 6px 18px 14px;
  }
  .claims-progress-bar {
    height: 8px;
    background: var(--charcoal-3);
    position: relative;
    overflow: hidden;
  }
  .claims-progress-fill {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    background: var(--good);
    transition: width 0.6s ease-out;
  }
  .claims-progress-fill.warn { background: var(--warn); }
  .claims-progress-fill.bad  { background: var(--bad); }
  .claims-footer {
    padding: 10px 18px;
    background: var(--panel-2);
    border-top: 1px solid var(--line);
    display: flex;
    justify-content: space-between;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
  }
  .claims-footer .label { color: var(--text-faint); letter-spacing: 1px; text-transform: uppercase; font-size: 10px; }
  .claims-footer .val { color: var(--text); margin-left: 6px; font-weight: 700; }

  /* Variations modal table */
  .var-table {
    width: 100%;
    border-collapse: collapse;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
  }
  .var-table thead th {
    background: var(--charcoal);
    color: var(--text-faint);
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 12px 18px;
    text-align: left;
    border-bottom: 1px solid var(--line);
  }
  .var-table tbody td {
    padding: 14px 18px;
    border-bottom: 1px solid var(--line);
    color: var(--text);
  }
  .var-table tbody tr:hover { background: var(--panel-2); }
  .var-table .amount { text-align: right; color: var(--yellow); font-weight: 700; }
  .var-table .status {
    display: inline-block; padding: 2px 8px; font-size: 10px;
    letter-spacing: 1px; text-transform: uppercase;
  }
  .var-table .status.approved { background: rgba(74, 222, 128, 0.2); color: var(--good); }
  .var-table .status.pending  { background: rgba(251, 191, 36, 0.2); color: var(--warn); }
  .var-table .status.rejected { background: rgba(248, 113, 113, 0.2); color: var(--bad); }
  .var-empty {

<!-- Job detail modal -->
<div class="modal-overlay" id="job-modal">

      <div class="left">

      <div><span class="label">Start</span><span class="val" id="modal-start">—</span></div>

<script>
  let MATERIALS = [];
  let JOBS = [];
  let LAST_UPDATED = null;
  let STATUS_OVERRIDES = {};   // { "Job Name": "complete"|"active" } — sourced from Firebase

  function effectiveStatus(j) {
    return STATUS_OVERRIDES[j.name] || j.status;
  }

  function fmt(n) { return n.toLocaleString('en-AU', { maximumFractionDigits: 0 }); }
  function pctClamped(a, b) { return b > 0 ? Math.min(100, (a / b) * 100) : 0; }
  function pctClass(p) {
    if (p > 100) return 'bad';   // over BOQ → red
    if (p >= 85) return 'warn';  // getting close → yellow
    return 'good';               // on track → green
  }
  // Pace classifier — for piles/LM where >100% means AHEAD of target rate (good).
  function pctClassPace(p) {
    if (p >= 100) return 'good';  // on or ahead of per-day target rate
    if (p >= 85)  return 'warn';  // slipping
    return 'bad';                 // behind
  }

  // Per-day pace: compares actual rate (actual/days_worked) to target rate (boq/boq_days).
  // Returns null if we can't compute (no labour data, zero BOQ, etc.) — caller falls back.
  function paceData(j, materialKey) {
    const labour = j.materials.labour;
    const m = j.materials[materialKey];
    if (!labour || !m) return null;
    if (labour.boq <= 0 || labour.actual <= 0 || m.boq <= 0) return null;

    const targetRate   = m.boq / labour.boq;       // e.g. 192 piles / 30 days = 6.4/day
    const actualRate   = m.actual / labour.actual; // e.g. 149 piles / 11 days = 13.5/day
    const remaining    = m.boq - m.actual;
    const remainingDays = labour.boq - labour.actual;

    // Already past BOQ totals → treat as complete (don't penalise on rate)
    if (remaining <= 0) {
      return { pct: 100, targetRate, actualRate, remaining: 0, remainingDays,
               behind: false, complete: true, requiredRate: null, needMoreDays: false };
    }

    const pct = targetRate > 0 ? (actualRate / targetRate) * 100 : 0;
    const behind = pct < 100;

    let requiredRate = null;
    let needMoreDays = false;
    if (behind) {
      if (remainingDays > 0) requiredRate = remaining / remainingDays;
      else                   needMoreDays = true;  // past day budget already
    }

    return { pct, targetRate, actualRate, remaining, remainingDays,
             behind, complete: false, requiredRate, needMoreDays };
  }

  // Build a half-circle gauge (top half of a circle).
  // Arc starts at left baseline, sweeps over the top, ends at right baseline.
  function gauge(percent, size, classOverride) {
    const sizes = {
      lg: { w: 88,  h: 50,  stroke: 9,  pad: 4 },
      sm: { w: 78,  h: 44,  stroke: 8,  pad: 4 },
      xl: { w: 180, h: 100, stroke: 14, pad: 6 },
    };
    const s = sizes[size] || sizes.sm;
    const w = s.w, h = s.h, stroke = s.stroke;
    const cx = w / 2;
    const cy = h - s.pad;                 // baseline
    const r  = (w / 2) - (stroke / 2) - 2;
    const pathD = `M ${cx - r} ${cy} A ${r} ${r} 0 0 1 ${cx + r} ${cy}`;
    const arcLen = Math.PI * r;
    const fillLen = (Math.min(100, percent) / 100) * arcLen;
    const cls = classOverride || pctClass(percent);
    return `
      <div class="gauge ${size}">
        <svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">
          <path class="track" d="${pathD}" stroke-width="${stroke}"/>
          <path class="fill ${cls}" d="${pathD}" stroke-width="${stroke}"
                stroke-dasharray="${fillLen} ${arcLen}"/>
        </svg>
        <div class="pct-text">${Math.round(percent)}%</div>
      </div>
    `;
  }

  function renderSummary() {
    const totals = {};
    MATERIALS.forEach(m => totals[m.key] = { week: 0, actual: 0, boq: 0 });
    JOBS.forEach(j => {
      MATERIALS.forEach(m => {
        totals[m.key].week += j.materials[m.key].week;
        totals[m.key].actual += j.materials[m.key].actual;
        totals[m.key].boq += j.materials[m.key].boq;
      });
    });
    document.getElementById('summary-strip').innerHTML = MATERIALS.map(m => {
      const t = totals[m.key];
      return `
        <div class="summary-tile">
          <div class="label">${m.label} — This Week</div>
          <div class="value">${fmt(t.week)}<span class="unit">${m.unit}</span></div>
        </div>
      `;
    }).join('');
  }

  const DOC_LABELS = {
    dockets:   "Dockets",
    pile_logs: "Pile Logs",
    schedules: "Schedules",
    drawings:  "Drawings",
    other:     "Other",
  };

  function docsRow(j) {
    const docs = j.documents || {};
    const keys = Object.keys(docs).filter(k => docs[k] > 0);
    if (keys.length === 0) {
      return `<div class="job-docs"><div class="doc-pill empty"><span class="label">No docs filed yet</span></div></div>`;
    }
    const pills = keys.map(k => `
      <div class="doc-pill">
        <span class="count">${docs[k]}</span>
        <span class="label">${DOC_LABELS[k] || k}</span>
      </div>
    `).join('');
    return `<div class="job-docs">${pills}</div>`;
  }

  function buildCardHtml(j, idx) {
      const status = effectiveStatus(j);
      const statusClass = status === 'active' ? 'status-active' : status === 'idle' ? 'status-idle' : 'status-complete';
      const cardClass = status === 'idle' ? 'job-card idle' : 'job-card';
      const cells = MATERIALS.map(m => {
        const d = j.materials[m.key];
        const isPace = (m.key === 'pilesDrilled' || m.key === 'lmDrilled');
        const pace = isPace ? paceData(j, m.key) : null;
        // For piles/LM: fill = % of BOQ done (intuitive), colour = on/behind pace
        let p, gaugeCls;
        if (pace) {
          p = pctClamped(d.actual, d.boq);
          gaugeCls = pctClassPace(pace.complete ? 100 : pace.pct);
        } else {
          p = pctClamped(d.actual, d.boq);
          gaugeCls = pctClass(p);
        }
        const liveDot = d.live ? '<span class="live-dot" title="Live from Firebase"></span>' : '';
        return `
          <div class="material-cell">
            <div class="name">${m.label}${liveDot}</div>
            ${gauge(p, 'sm', gaugeCls)}
            <div class="nums">
              <div><span class="actual">${fmt(d.actual)}</span> <span class="unit-txt">${m.unit}</span></div>
              <div class="boq-line">/ ${fmt(d.boq)}</div>
            </div>
          </div>
        `;
      }).join('');
      return `
        <div class="${cardClass}" data-job-index="${idx}">
          <div class="job-header">
            <div class="left">
              <div class="job-id">JOB ${j.id}</div>
              <div class="job-name">${j.name}</div>
              <div class="job-client">${j.client}</div>
            </div>
            <div class="status-badge ${statusClass}" data-job-name="${j.name}" title="Click to toggle complete/active">${status}</div>
          </div>
          <div class="job-body">${cells}</div>
          ${docsRow(j)}
          <div class="job-footer">
            <div><span class="label">SUPERVISOR</span><span class="val">${j.supervisor}</span></div>
            <div><span class="label">START</span><span class="val">${j.startDate}</span></div>
          </div>
        </div>
      `;
  }

  function renderJobs() {
    // Split jobs by effective status. Completed jobs move to their own tab.
    const activeJobs    = [];
    const completedJobs = [];
    JOBS.forEach((j, idx) => {
      const entry = { j, idx };  // preserve global index for modal click
      if (effectiveStatus(j) === 'complete') completedJobs.push(entry);
      else                                    activeJobs.push(entry);
    });

    document.getElementById('job-count').textContent = `${activeJobs.length} JOBS`;
    document.getElementById('completed-count').textContent = `${completedJobs.length} JOBS`;

    const activeHtml = activeJobs.map(e => buildCardHtml(e.j, e.idx)).join('')
      || '<div style="padding:40px;color:var(--text-dim);text-align:center;">No active jobs.</div>';
    const completedHtml = completedJobs.map(e => buildCardHtml(e.j, e.idx)).join('')
      || '<div style="padding:40px;color:var(--text-dim);text-align:center;">No completed jobs yet.</div>';

    document.getElementById('jobs-grid').innerHTML = activeHtml;
    document.getElementById('jobs-grid-clone').innerHTML = activeHtml;
    document.getElementById('completed-grid').innerHTML = completedHtml;
  }

  // Auto-scroll the jobs viewport. Loops seamlessly using a duplicated grid.
  function startAutoScroll() {
    const viewport = document.getElementById('jobs-viewport');
    const scroller = document.getElementById('jobs-scroller');
    const firstGrid = document.getElementById('jobs-grid');
    let offset = 0;
    let paused = false;
    const SPEED = 0.15; // pixels per frame (~9px/sec at 60fps - very slow read pace)
    const GAP = 16;    // matches CSS gap on .jobs-scroller

    viewport.addEventListener('mouseenter', () => paused = true);
    viewport.addEventListener('mouseleave', () => paused = false);

    function step() {
      const firstGridHeight = firstGrid.offsetHeight;
      // Always scroll — even if all jobs fit, we still want them to rotate through.
      // Only skip if the grid hasn't rendered yet.
      if (firstGridHeight < 10) {
        requestAnimationFrame(step);
        return;
      }
      const modalEl = document.getElementById('job-modal');
      const modalIsOpen = modalEl && modalEl.classList.contains('show');
      if (!paused && !modalIsOpen) {
        offset += SPEED;
        // Reset once we've scrolled past the first grid (plus the gap to clone)
        if (offset >= firstGridHeight + GAP) {
          offset = 0;
        }
        scroller.style.transform = `translateY(${-offset}px)`;
      }
      requestAnimationFrame(step);
    }
    // Wait one frame so layout has settled before measuring
    requestAnimationFrame(() => requestAnimationFrame(step));
  }

  // ============ CLAIMS RENDERING ============
  function fmtMoney(n) {
    n = Number(n) || 0;
    return '$' + n.toLocaleString('en-AU', { maximumFractionDigits: 0 });
  }

  function getClaimsData(j) {
    const c = j.claims || {};
    const boqPrice = Number(c.boqPrice) || 0;
    const variations = Array.isArray(c.variations) ? c.variations : [];
    const variationsTotal = variations.reduce((s, v) => s + (Number(v.amount) || 0), 0);
    // claimed can be a single number OR a list of { claim_no, date, amount, status } entries
    let claimHistory = [];
    let claimed = 0;
    if (Array.isArray(c.claimed)) {
      claimHistory = c.claimed;
      claimed = claimHistory.reduce((s, x) => s + (Number(x.amount) || 0), 0);
    } else {
      claimed = Number(c.claimed) || 0;
      // Optional: separate claim_history list alongside numeric claimed
      if (Array.isArray(c.claim_history)) claimHistory = c.claim_history;
    }
    const contractTotal = boqPrice + variationsTotal;
    const pctClaimed = contractTotal > 0 ? (claimed / contractTotal) * 100 : 0;
    const remaining = contractTotal - claimed;
    return { boqPrice, variations, variationsTotal, claimed, claimHistory, contractTotal, pctClaimed, remaining };
  }

  function renderClaims() {
    const grid = document.getElementById('claims-grid');
    const stripEl = document.getElementById('claims-totals-strip');
    const countEl = document.getElementById('claims-count');
    if (!grid || !stripEl) return;

    // Show all jobs (active + completed) so completed jobs can still have final claim tracking
    const jobs = JOBS;
    countEl.textContent = `${jobs.length} JOBS`;

    // Totals across all jobs
    let totBoq = 0, totVar = 0, totClaimed = 0;
    jobs.forEach(j => {
      const c = getClaimsData(j);
      totBoq += c.boqPrice;
      totVar += c.variationsTotal;
      totClaimed += c.claimed;
    });
    const totContract = totBoq + totVar;
    const totRemaining = totContract - totClaimed;
    const totPct = totContract > 0 ? (totClaimed / totContract) * 100 : 0;

    stripEl.innerHTML = `

  // ============ DATA LOAD ============
  // Fetches data.json (cache-busted) and re-renders. Called on init and every 5 min.
  async function loadData() {
    try {
      const res = await fetch('data.json?t=' + Date.now(), { cache: 'no-store' });
      if (!res.ok) throw new Error('fetch failed: ' + res.status);
      const payload = await res.json();
      MATERIALS = payload.materials || [];
      JOBS = payload.jobs || [];
      LAST_UPDATED = payload.lastUpdated || null;
      renderSummary();
      renderJobs();
      renderClaims();
      renderTicker();

      // Apply live overrides from Firebase (Option A + B integration)
      // — overrides happen in the background after the weekly batch renders,
      //   so the screen never flickers
      applyLiveOverrides().then(() => {
        renderSummary();
        renderJobs();
        renderTicker();
      }).catch(err => console.warn('Live overrides failed (using batch data):', err));
    } catch (err) {
      console.error('Could not load data.json:', err);
      const grid = document.getElementById('jobs-grid');
      if (grid && !grid.innerHTML) {
        grid.innerHTML = '<div style="padding:40px;color:var(--text-dim);text-align:center;">Could not load data.json — check the file is present.</div>';
      }
    }
  }

  // ============ LIVE FIREBASE OVERRIDES ============
  // Wait for Firebase to be ready (init runs in a separate <script type=module>)
  function whenFirebaseReady() {
    return new Promise((resolve, reject) => {
      if (window.sthLive && window.sthLive.ready) return resolve(window.sthLive);
      const timeout = setTimeout(() => reject(new Error('Firebase init timeout')), 8000);
      window.addEventListener('firebase-ready', () => {
        clearTimeout(timeout);
        resolve(window.sthLive);
      }, { once: true });
    });
  }

  // Rough name normalisation — strips common road words, punctuation, lowercases.
  // Used to match dashboard job names to Firebase project names.
  function normalizeJobName(name) {
    if (!name) return '';
    return String(name)
      .toLowerCase()
      .replace(/[,\-–—_/\\.]/g, ' ')
      .replace(/\b(rd|road|st|street|ave|avenue|dr|drive|cres|crescent|ct|court|lane|ln|terrace|tce|place|pl|hwy|highway|way|grove|gr)\b/g, '')
      .replace(/\s+/g, ' ')
      .trim();
  }

  // Returns true if the two job names are a "rough match" (one contains the other after normalisation)
  function jobNamesMatch(dashboardName, firebaseName) {
    const a = normalizeJobName(dashboardName);
    const b = normalizeJobName(firebaseName);
    if (!a || !b) return false;
    if (a === b) return true;
    // Check substring match in either direction (handles "7-9 Bald Hill" vs "Bald Hill")
    return a.includes(b) || b.includes(a);
  }

  // Truck capacities in m³ (mirrors the cartage app's TRUCK_CAPACITIES)
  const TRUCK_CAPACITIES_M3 = { 'Tandem': 10, 'TT': 22, 'Quad': 25 };

  // Apply live overrides on top of the JOBS array loaded from data.json.
  // - pilesDrilled.actual: count of done piles in matching Firebase job
  // - lmDrilled.actual: sum of actualDepth across done piles
  // - concrete.actual: sum of actualConcrete across done piles + cartage concrete loads
  // - soil.actual: sum of cartage fill/topsoil/etc loads (m³)
  async function applyLiveOverrides() {
    const fb = await whenFirebaseReady();
    const { db, collection, query, where, getDocs } = fb;

    // Get all active Firebase jobs
    const jobsQ = query(collection(db, 'jobs'), where('active', '==', true));
    const jobsSnap = await getDocs(jobsQ);

    if (jobsSnap.empty) return;

    // Build a lookup of dashboard jobs by normalised name
    const dashboardJobsByName = JOBS.map(j => ({ job: j, normalized: normalizeJobName(j.name) }));

    // For each Firebase job, find matching dashboard job and compute live numbers
    for (const jobDoc of jobsSnap.docs) {
      const fbJob = jobDoc.data();
      const fbProject = fbJob.project || '';
      const fbJobId = jobDoc.id;

      // Find matching dashboard job
      const match = dashboardJobsByName.find(({ job }) => jobNamesMatch(job.name, fbProject));
      if (!match) continue;
      const dashJob = match.job;

      // --- PILING OVERRIDES ---
      if (fbJob.hasPiling) {
        try {
          const pilesSnap = await getDocs(collection(db, 'jobs', fbJobId, 'piles'));
          let donePiles = 0;
          let totalLm = 0;
          let pileConcrete = 0;
          pilesSnap.forEach(p => {
            const d = p.data();
            if (d.status === 'done') {
              donePiles++;
              if (typeof d.actualDepth === 'number') totalLm += d.actualDepth;
              if (typeof d.actualConcrete === 'number') pileConcrete += d.actualConcrete;
            }
          });

          // Only override if Firebase has MORE data than data.json — never zero out a good number.
          if (dashJob.materials.pilesDrilled && donePiles > (dashJob.materials.pilesDrilled.actual || 0)) {
            dashJob.materials.pilesDrilled.actual = donePiles;
            dashJob.materials.pilesDrilled.live = true;
          }
          if (dashJob.materials.lmDrilled && totalLm > (dashJob.materials.lmDrilled.actual || 0)) {
            dashJob.materials.lmDrilled.actual = Math.round(totalLm);
            dashJob.materials.lmDrilled.live = true;
          }
          // Concrete from piling (might be added to cartage concrete below)
          dashJob._pileConcrete = pileConcrete;
        } catch (e) {
          console.warn('Piles read failed for', fbProject, e);
        }
      }

      // --- CARTAGE OVERRIDES ---
      try {
        const trucksSnap = await getDocs(collection(db, 'jobs', fbJobId, 'trucks'));
        let cartageConcrete = 0;
        let cartageSoil = 0;

        for (const truckDoc of trucksSnap.docs) {
          const truck = truckDoc.data();
          const cap = TRUCK_CAPACITIES_M3[truck.type] || 10;

          const loadsSnap = await getDocs(collection(db, 'jobs', fbJobId, 'trucks', truckDoc.id, 'loads'));
          loadsSnap.forEach(l => {
            const load = l.data();
            const mat = (load.material || '').toLowerCase();
            if (mat.includes('concrete')) {
              cartageConcrete += cap;
            } else if (mat.includes('fill') || mat.includes('soil') || mat.includes('clay') ||
                       mat.includes('mudstone') || mat.includes('rock') || mat.includes('sand') ||
                       mat.includes('topsoil') || mat.includes('vegetation')) {
              cartageSoil += cap;
            }
          });
        }

        // Concrete = pile concrete + cartage concrete (combined view of how much concrete went into the job)
        // Only override if Firebase total is higher than data.json (never go backwards).
        if (dashJob.materials.concrete) {
          const pileC = dashJob._pileConcrete || 0;
          const fbConcrete = Math.round(pileC + cartageConcrete);
          if (fbConcrete > (dashJob.materials.concrete.actual || 0)) {
            dashJob.materials.concrete.actual = fbConcrete;
            dashJob.materials.concrete.live = true;
          }
        }
        // Soil from cartage only — only override if Firebase has more.
        if (dashJob.materials.soil && cartageSoil > (dashJob.materials.soil.actual || 0)) {
          dashJob.materials.soil.actual = Math.round(cartageSoil);
          dashJob.materials.soil.live = true;
        }
      } catch (e) {
        console.warn('Cartage read failed for', fbProject, e);
      }

      delete dashJob._pileConcrete; // cleanup
    }

    console.log('[Live] Applied Firebase overrides to', jobsSnap.size, 'job(s)');
  }

  // Initial load + render
  loadData().then(() => {
    startAutoScroll();
  });

  // Refresh data every 5 minutes
  setInterval(loadData, 5 * 60 * 1000);

  tickClock();
  setInterval(tickClock, 1000);

  // ============ TABS ============
  document.getElementById('tabs').addEventListener('click', (e) => {
    const tab = e.target.closest('.tab');

  // ============ JOB DETAIL MODAL ============
  const modal = document.getElementById('job-modal');

  let modalOpen = false;

    // Render xl material cells
    const cells = MATERIALS.map(m => {
      const d = j.materials[m.key];
      const isPace = (m.key === 'pilesDrilled' || m.key === 'lmDrilled');
      const pace = isPace ? paceData(j, m.key) : null;
      const liveDot = d.live ? '<span class="live-dot" title="Live from Firebase"></span>' : '';

      // For piles/LM: gauge fill = % of BOQ done, gauge colour = pace status
      let p, gaugeCls;
      if (pace) {
        p = pctClamped(d.actual, d.boq);
        gaugeCls = pctClassPace(pace.complete ? 100 : pace.pct);
      } else {
        p = pctClamped(d.actual, d.boq);
        gaugeCls = pctClass(p);
      }

      // Bottom lines: for pace materials, show actual rate vs target rate + catchup
      let bottomLines;
      if (pace) {
        if (pace.complete) {
          bottomLines = `
            <div class="boq-line">${pace.actualRate.toFixed(1)}/day &middot; target ${pace.targetRate.toFixed(1)}/day</div>

          } else if (pace.requiredRate != null) {
            catchup = `<div class="catchup-line">Need ${pace.requiredRate.toFixed(1)} ${m.unit}/day to hit BOQ</div>`;
          }
          bottomLines = `
            <div class="boq-line">${pace.actualRate.toFixed(1)}/day &middot; target ${pace.targetRate.toFixed(1)}/day</div>
            ${catchup}
            <div class="week-line">This week: <span class="wk-val">${fmt(d.week)}</span> ${m.unit}</div>
          `;
        } else {
          bottomLines = `
            <div class="boq-line">${pace.actualRate.toFixed(1)}/day &middot; target ${pace.targetRate.toFixed(1)}/day</div>
            <div class="ahead-line">${Math.round(pace.pct - 100)}% ahead of pace</div>
            <div class="week-line">This week: <span class="wk-val">${fmt(d.week)}</span> ${m.unit}</div>
          `;
        }
      } else {
        bottomLines = `
          <div class="boq-line">BOQ target</div>
          <div class="week-line">This week: <span class="wk-val">${fmt(d.week)}</span> ${m.unit}</div>
        `;
      }

      return `
        <div class="modal-material-cell">
          <div class="name">${m.label}${liveDot}</div>
          ${gauge(p, 'xl', gaugeCls)}
          <div class="nums">
            <div><span class="actual">${fmt(d.actual)} of ${fmt(d.boq)}</span> <span class="unit-txt">${m.unit}</span></div>
            ${bottomLines}
          </div>
        </div>
      `;
    }).join('');
    document.getElementById('modal-body').innerHTML = cells;

    // Docs row
    const docs = j.documents || {};
    const keys = Object.keys(docs).filter(k => docs[k] > 0);
    const docsEl = document.getElementById('modal-docs');
    if (keys.length === 0) {
      docsEl.innerHTML = '<div class="doc-pill empty"><span class="label">No docs filed yet</span></div>';
    } else {
      docsEl.innerHTML = keys.map(k => `
        <div class="doc-pill">
          <span class="count">${docs[k]}</span>
          <span class="label">${DOC_LABELS[k] || k}</span>
        </div>
      `).join('');
    }

    modal.classList.add('show');
    modalOpen = true;
  }

  function closeJobModal() {
    modal.classList.remove('show');
    modalOpen = false;
  }

  // ============ JOB STATUS BADGE (click to toggle) ============
  // Two-step confirm: first click arms the badge (red pulse), second click within 3s commits.
  let armedBadge = null;
  let armedTimeout = null;

  async function commitStatusChange(jobName) {
    const fb = await whenFirebaseReady();
    const { db, setDoc, serverTimestamp } = fb;
    const currentEff = STATUS_OVERRIDES[jobName] || (JOBS.find(j => j.name === jobName) || {}).status || 'active';
    const next = currentEff === 'complete' ? 'active' : 'complete';
    try {
      await setDoc(fb.doc(db, 'job_status_overrides', jobName), {
        status: next,
        updatedAt: serverTimestamp(),
      });
      console.log(`[status] ${jobName} → ${next}`);
      STATUS_OVERRIDES[jobName] = next;
      renderJobs();
      renderClaims();
      renderTicker();
    } catch (err) {
      console.error('Status update failed:', err);
      alert('Could not update status. Firebase rules may need updating to allow writes on job_status_overrides.');
    }
  }

  function armBadge(badge) {
    if (armedBadge && armedBadge !== badge) {
      armedBadge.classList.remove('confirming');
      armedBadge.textContent = armedBadge.dataset.origText || armedBadge.textContent;
    }
    badge.dataset.origText = badge.textContent;
    badge.textContent = 'CLICK AGAIN';
    badge.classList.add('confirming');
    armedBadge = badge;
    if (armedTimeout) clearTimeout(armedTimeout);
    armedTimeout = setTimeout(() => {
      if (armedBadge) {
        armedBadge.classList.remove('confirming');
        armedBadge.textContent = armedBadge.dataset.origText || armedBadge.textContent;
        armedBadge = null;
      }
    }, 3000);
  }

  // Master click handler — routes to badge, variations cell, or card modal
  document.addEventListener('click', (e) => {
    const badge = e.target.closest('.status-badge');
    if (badge && badge.dataset.jobName) {
      e.stopPropagation();
      const jobName = badge.dataset.jobName;
      if (armedBadge === badge) {
        if (armedTimeout) clearTimeout(armedTimeout);
        badge.classList.remove('confirming');
        armedBadge = null;
        commitStatusChange(jobName);
      } else {
        armBadge(badge);
      }
      return;
    }
    const varCell = e.target.closest('.variations-cell');
    if (varCell && varCell.dataset.variationsJob) {
      e.stopPropagation();
      openClaimsModal(varCell.dataset.variationsJob);
      return;
    }
    // Claims card click → open claims detail modal
    const claimsCard = e.target.closest('.claims-card');
    if (claimsCard && claimsCard.dataset.jobName) {
      openClaimsModal(claimsCard.dataset.jobName);
      return;
    }
    const card = e.target.closest('.job-card');
    if (!card) return;
    const idx = parseInt(card.dataset.jobIndex, 10);
    if (!Number.isNaN(idx)) openJobModal(idx);
  });

  modalClose.addEventListener('click', closeJobModal);
  modal.addEventListener('click', (e) => {
    if (e.target === modal) closeJobModal();
  });

  // Claims modal close handlers
  document.getElementById('cm-close').addEventListener('click', () => {
    document.getElementById('claims-modal').classList.remove('show');
  });
  document.getElementById('claims-modal').addEventListener('click', (e) => {
    if (e.target.id === 'claims-modal') {
      document.getElementById('claims-modal').classList.remove('show');

  document.addEventListener('keydown', (e) => {

      document.getElementById('claims-modal').classList.remove('show');

  // ============ LIVE STATUS OVERRIDES FROM FIRESTORE ============
  whenFirebaseReady().then(fb => {
    const { db, collection, onSnapshot } = fb;
    onSnapshot(collection(db, 'job_status_overrides'), (snap) => {
      const next = {};
      snap.forEach(d => {
        const data = d.data();
        if (data && data.status) next[d.id] = data.status;
      });
      STATUS_OVERRIDES = next;
      renderJobs();
      renderClaims();
      renderTicker();
    });
  }).catch(err => console.warn('Status override listener init failed:', err));

  // ============ PWA / INSTALL ============
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js')
        .then(reg => console.log('SW registered', reg.scope))
        .catch(err => console.warn('SW registration failed', err));
    });
  }

  let deferredPrompt = null;
  const installBtn = document.getElementById('install-btn');

  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    installBtn.classList.add('show');
  });

  installBtn.addEventListener('click', async () => {
    if (!deferredPrompt) return;
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    console.log(`Install prompt: ${outcome}`);
    deferredPrompt = null;
    installBtn.classList.remove('show');
  });

  window.addEventListener('appinstalled', () => {
    installBtn.classList.remove('show');
    deferredPrompt = null;
  });
</script>

</body>
</html>
